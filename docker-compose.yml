version: '3.9'

# ═══════════════════════════════════════════════════════════════
# DocMind — Docker Compose
# Services: backend (FastAPI) + frontend (Nginx)
# Usage:
#   cp .env.example .env    # fill in OPENAI_API_KEY
#   docker-compose up -d --build
#   Open: http://localhost:3000
# ═══════════════════════════════════════════════════════════════

services:

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: docmind-backend:latest
    container_name: docmind-backend
    restart: unless-stopped
    ports:
      - "8000:8000"        # Direct API access + Swagger at :8000/docs
    env_file:
      - .env               # Root-level .env (created from .env.example)
    environment:
      - APP_ENV=production
    volumes:
      - uploads_data:/app/uploads
      - vector_stores_data:/app/vector_stores
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - docmind-net

  # ── Nginx Frontend ────────────────────────────────────────────
  frontend:
    image: nginx:1.27-alpine
    container_name: docmind-frontend
    restart: unless-stopped
    ports:
      - "3000:80"          # Open http://localhost:3000 in your browser
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - docmind-net

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  uploads_data:
    driver: local
  vector_stores_data:
    driver: local

# ── Network ───────────────────────────────────────────────────
networks:
  docmind-net:
    driver: bridge

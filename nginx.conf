# ───────────────────────────────────────────────────────────────────
# DocMind nginx — serves the static frontend
# Also exposes health & docs endpoints via proxy to the backend
# ───────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # ── Charset & logging ──
    charset utf-8;
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Static frontend ───────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy: API calls to backend ───────────────────────────────
    # Allows the frontend to call /api/* without hardcoding port 8000
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 15M;
    }

    # ── Proxy: health & docs ──────────────────────────────────────
    location ~ ^/(health|docs|redoc|openapi\.json) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "same-origin"  always;

    # ── Custom error pages ────────────────────────────────────────
    error_page 502 503 504 /index.html;
}
